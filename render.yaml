services:
  - type: web
    name: swift62-discord-bot
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      # build time args
      - key: DOCKER_IMAGE
        value: swift:6.2
      - key: SWIFT_WEBROOT
        value: https://download.swift.org/swift-6.2-branch
      - key: USE_SNAPSHOT
        value: true
      # runtime environment variables
      - key: DISCORD_NICKNAME
        sync: false
      - key: DISCORD_PLAYING
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
    autoDeploy: false
