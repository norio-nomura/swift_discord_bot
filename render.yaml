services:
  - type: web
    name: swift57-discord-bot
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DISCORD_NICKNAME
        sync: false
      - key: DISCORD_PLAYING
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DOCKER_IMAGE
        value: swift:5.7
      - key: GITHUB_TOKEN
        sync: false
      - key: SWIFT_WEBROOT
        sync: false
    autoDeploy: false
