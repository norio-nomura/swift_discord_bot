services:
  - type: web
    name: swift510-discord-bot
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile.nightly
    healthCheckPath: /
    envVars:
      - key: DISCORD_NICKNAME
        sync: false
      - key: DISCORD_PLAYING
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DOCKER_IMAGE
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: SWIFT_WEBROOT
        value: https://download.swift.org/swift-5.10-branch
    autoDeploy: false 
